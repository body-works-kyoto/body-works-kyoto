<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>板金見積もり AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --navy: #1a2744;
      --navy-light: #243560;
      --blue: #2563eb;
      --blue-light: #3b82f6;
      --accent: #f59e0b;
      --bg: #f1f5f9;
      --white: #ffffff;
      --gray: #64748b;
      --gray-light: #e2e8f0;
      --red: #ef4444;
      --green: #22c55e;
    }

    body {
      font-family: -apple-system, 'Hiragino Sans', sans-serif;
      background: var(--bg);
      color: var(--navy);
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, var(--navy), var(--navy-light));
      padding: 20px 24px;
      color: white;
    }
    .header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
    .header-icon { font-size: 28px; }
    .header-title { font-size: 20px; font-weight: 800; letter-spacing: 1px; }
    .header-sub { font-size: 12px; color: rgba(255,255,255,0.6); margin-left: 40px; }

    .content { padding: 20px 16px 80px; }

    /* Card */
    .card {
      background: var(--white);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .card-title {
      font-size: 13px; font-weight: 700; color: var(--gray);
      text-transform: uppercase; letter-spacing: 0.5px;
      margin-bottom: 14px; display: flex; align-items: center; gap: 6px;
    }

    /* Upload Area */
    .upload-area {
      border: 2px dashed var(--gray-light);
      border-radius: 14px; padding: 32px 20px;
      text-align: center; cursor: pointer;
      transition: all 0.2s; background: #fafafa;
      position: relative; overflow: hidden;
    }
    .upload-area:hover { border-color: var(--blue); background: #eff6ff; }
    .upload-area.has-image { border-style: solid; border-color: var(--blue); padding: 0; }
    .upload-icon { font-size: 36px; margin-bottom: 8px; }
    .upload-text { font-size: 14px; font-weight: 600; color: var(--navy); }
    .upload-hint { font-size: 12px; color: var(--gray); margin-top: 4px; }
    .preview-img { width: 100%; border-radius: 12px; display: block; max-height: 260px; object-fit: cover; }
    .change-photo {
      position: absolute; bottom: 10px; right: 10px;
      background: rgba(0,0,0,0.6); color: white;
      border: none; border-radius: 8px; padding: 6px 12px;
      font-size: 12px; cursor: pointer;
    }
    input[type="file"] { display: none; }

    /* Analyze Button */
    .analyze-btn {
      width: 100%; padding: 16px;
      background: linear-gradient(135deg, var(--blue), var(--blue-light));
      color: white; border: none; border-radius: 14px;
      font-size: 16px; font-weight: 700; cursor: pointer;
      margin-bottom: 16px; transition: opacity 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .analyze-btn:hover { opacity: 0.9; }
    .analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Loading */
    .loading-card {
      background: var(--white); border-radius: 16px; padding: 32px 20px;
      text-align: center; margin-bottom: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .loading-spinner {
      width: 48px; height: 48px;
      border: 4px solid var(--gray-light);
      border-top-color: var(--blue);
      border-radius: 50%; animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 15px; font-weight: 600; color: var(--navy); }
    .loading-sub { font-size: 12px; color: var(--gray); margin-top: 6px; }

    /* Result */
    .result-card { background: var(--white); border-radius: 16px; overflow: hidden; margin-bottom: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }

    .result-section { padding: 16px 20px; }
    .result-section + .result-section { border-top: 1px solid var(--gray-light); }

    .section-header {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; font-weight: 700; margin-bottom: 12px;
    }
    .section-badge {
      padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700;
    }
    .badge-itakin { background: #dbeafe; color: var(--blue); }
    .badge-toso { background: #fef3c7; color: #d97706; }
    .badge-parts { background: #f0fdf4; color: #16a34a; }

    .estimate-row {
      display: flex; align-items: center;
      padding: 10px 0; border-bottom: 1px solid #f8fafc;
      gap: 8px;
    }
    .estimate-row:last-child { border-bottom: none; }

    .est-name { flex: 1; font-size: 13px; font-weight: 600; }
    .est-detail { font-size: 11px; color: var(--gray); margin-top: 2px; }
    .est-index { font-size: 12px; color: var(--blue); font-weight: 600; min-width: 60px; text-align: center; }
    .est-price { font-size: 14px; font-weight: 700; color: var(--navy); min-width: 70px; text-align: right; }

    /* Total */
    .total-section { background: var(--navy); padding: 20px; }
    .total-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .total-label { font-size: 13px; color: rgba(255,255,255,0.7); }
    .total-value { font-size: 14px; font-weight: 600; color: white; }
    .total-divider { border: none; border-top: 1px solid rgba(255,255,255,0.15); margin: 12px 0; }
    .grand-label { font-size: 14px; color: rgba(255,255,255,0.9); font-weight: 700; }
    .grand-value { font-size: 24px; font-weight: 800; color: var(--accent); }

    /* Info note */
    .info-note {
      background: #fffbeb; border: 1px solid #fde68a;
      border-radius: 12px; padding: 12px 16px;
      font-size: 12px; color: #92400e; margin-bottom: 16px;
      display: flex; gap: 8px;
    }

    /* Reset btn */
    .reset-btn {
      width: 100%; padding: 14px;
      background: var(--gray-light); color: var(--gray);
      border: none; border-radius: 14px;
      font-size: 14px; font-weight: 600; cursor: pointer;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="header-icon">🔧</div>
    <div class="header-title">板金見積もり AI</div>
  </div>
  <div class="header-sub">写真を撮るだけで概算見積もり</div>
</div>

<div class="content">

  <!-- Upload -->
  <div class="card" id="upload-section">
    <div class="card-title">📷 損傷写真をアップロード</div>
    <label class="upload-area" id="upload-area" for="file-input">
      <div id="upload-placeholder">
        <div class="upload-icon">🚗</div>
        <div class="upload-text">写真をタップして選択</div>
        <div class="upload-hint">傷・へこみが見える角度で撮影</div>
      </div>
      <img id="preview-img" class="preview-img hidden" src="" alt="">
      <button class="change-photo hidden" id="change-photo-btn" onclick="event.preventDefault()">📷 変更</button>
    </label>
    <input type="file" id="file-input" accept="image/*" capture="environment">
  </div>

  <!-- Analyze Button -->
  <button class="analyze-btn" id="analyze-btn" disabled onclick="analyze()">
    🔍 AIで見積もりを作成
  </button>

  <!-- Loading -->
  <div class="loading-card hidden" id="loading-section">
    <div class="loading-spinner"></div>
    <div class="loading-text">AIが損傷を解析中...</div>
    <div class="loading-sub">板金・塗装・部品を自動で判定しています</div>
  </div>

  <!-- Info Note -->
  <div class="info-note hidden" id="info-note">
    ⚠️ こちらはAIによる概算です。実際の金額は現車確認後に正式見積もりをご提示します。
  </div>

  <!-- Result -->
  <div class="result-card hidden" id="result-section">

    <!-- 鈑金 -->
    <div class="result-section">
      <div class="section-header">
        <span class="section-badge badge-itakin">鈑金明細</span>
      </div>
      <div id="itakin-rows"></div>
    </div>

    <!-- 塗装 -->
    <div class="result-section">
      <div class="section-header">
        <span class="section-badge badge-toso">塗装明細</span>
      </div>
      <div id="toso-rows"></div>
    </div>

    <!-- 部品 -->
    <div class="result-section" id="parts-section">
      <div class="section-header">
        <span class="section-badge badge-parts">部品明細</span>
      </div>
      <div id="parts-rows"></div>
    </div>

    <!-- 合計 -->
    <div class="total-section">
      <div class="total-row">
        <span class="total-label">修理技術料</span>
        <span class="total-value" id="total-itakin">¥0</span>
      </div>
      <div class="total-row">
        <span class="total-label">塗装技術料</span>
        <span class="total-value" id="total-toso">¥0</span>
      </div>
      <div class="total-row">
        <span class="total-label">部品代合計</span>
        <span class="total-value" id="total-parts">¥0</span>
      </div>
      <hr class="total-divider">
      <div class="total-row">
        <span class="total-label">小計</span>
        <span class="total-value" id="subtotal">¥0</span>
      </div>
      <div class="total-row">
        <span class="total-label">消費税(10%)</span>
        <span class="total-value" id="tax">¥0</span>
      </div>
      <hr class="total-divider">
      <div class="total-row">
        <span class="grand-label">総合計</span>
        <span class="grand-value" id="grand-total">¥0</span>
      </div>
    </div>
  </div>

  <button class="reset-btn hidden" id="reset-btn" onclick="reset()">🔄 もう一度見積もる</button>

</div>

<script>
  // 単価設定
  const ITAKIN_PER_INDEX = 9000;   // 板金 1指数 = 9,000円
  const TOSO_PER_PANEL   = 50000;  // 塗装 1パネル = 50,000円

  const fileInput = document.getElementById('file-input');
  const analyzeBtn = document.getElementById('analyze-btn');
  let selectedFile = null;

  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    selectedFile = file;

    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = document.getElementById('preview-img');
      img.src = ev.target.result;
      img.classList.remove('hidden');
      document.getElementById('upload-placeholder').classList.add('hidden');
      document.getElementById('change-photo-btn').classList.remove('hidden');
      document.getElementById('upload-area').classList.add('has-image');
      analyzeBtn.disabled = false;
    };
    reader.readAsDataURL(file);
  });

  document.getElementById('change-photo-btn').addEventListener('click', (e) => {
    e.preventDefault();
    fileInput.click();
  });

  async function analyze() {
    if (!selectedFile) return;

    // Show loading
    document.getElementById('upload-section').classList.add('hidden');
    analyzeBtn.classList.add('hidden');
    document.getElementById('loading-section').classList.remove('hidden');
    document.getElementById('result-section').classList.add('hidden');
    document.getElementById('reset-btn').classList.add('hidden');
    document.getElementById('info-note').classList.add('hidden');

    // APIへ送信
    const formData = new FormData();
    formData.append('image', selectedFile);

    try {
      const res = await fetch('/api/estimate', { method: 'POST', body: formData });
      const data = await res.json();
      showResult(data);
    } catch (err) {
      // API未接続時はデモデータ表示
      showResult(demoData());
    }
  }

  function demoData() {
    return {
      itakin: [
        { name: 'リアゲートパネル', detail: 'へこみ（中程度）', index: 2.0 },
        { name: 'リアバンパー', detail: 'へこみ（軽度）', index: 1.0 },
      ],
      toso: [
        { name: 'リアゲート', panels: 1 },
        { name: 'リアバンパー', panels: 1 },
      ],
      parts: [
        { name: '左テールランプ', partPrice: 12000, labor: 3000 },
      ]
    };
  }

  function showResult(data) {
    document.getElementById('loading-section').classList.add('hidden');

    // 板金
    let itakinTotal = 0;
    const itakinRows = document.getElementById('itakin-rows');
    itakinRows.innerHTML = '';
    data.itakin.forEach(item => {
      const price = Math.round(item.index * ITAKIN_PER_INDEX);
      itakinTotal += price;
      itakinRows.innerHTML += `
        <div class="estimate-row">
          <div style="flex:1">
            <div class="est-name">${item.name}</div>
            <div class="est-detail">${item.detail}</div>
          </div>
          <div class="est-index">${item.index}指数</div>
          <div class="est-price">${price.toLocaleString()}円</div>
        </div>`;
    });

    // 塗装
    let tosoTotal = 0;
    const tosoRows = document.getElementById('toso-rows');
    tosoRows.innerHTML = '';
    data.toso.forEach(item => {
      const price = item.panels * TOSO_PER_PANEL;
      tosoTotal += price;
      tosoRows.innerHTML += `
        <div class="estimate-row">
          <div style="flex:1">
            <div class="est-name">${item.name}</div>
            <div class="est-detail">全面塗装 ${item.panels}パネル</div>
          </div>
          <div class="est-index">${item.panels}P</div>
          <div class="est-price">${price.toLocaleString()}円</div>
        </div>`;
    });

    // 部品
    let partsTotal = 0;
    const partsRows = document.getElementById('parts-rows');
    partsRows.innerHTML = '';
    if (data.parts && data.parts.length > 0) {
      data.parts.forEach(item => {
        const total = item.partPrice + item.labor;
        partsTotal += total;
        partsRows.innerHTML += `
          <div class="estimate-row">
            <div style="flex:1">
              <div class="est-name">${item.name}</div>
              <div class="est-detail">部品代 ${item.partPrice.toLocaleString()}円 ＋ 工賃 ${item.labor.toLocaleString()}円</div>
            </div>
            <div class="est-price">${total.toLocaleString()}円</div>
          </div>`;
      });
    } else {
      document.getElementById('parts-section').classList.add('hidden');
    }

    // 合計
    const subtotal = itakinTotal + tosoTotal + partsTotal;
    const tax = Math.round(subtotal * 0.1);
    const grand = subtotal + tax;

    document.getElementById('total-itakin').textContent = `¥${itakinTotal.toLocaleString()}`;
    document.getElementById('total-toso').textContent = `¥${tosoTotal.toLocaleString()}`;
    document.getElementById('total-parts').textContent = `¥${partsTotal.toLocaleString()}`;
    document.getElementById('subtotal').textContent = `¥${subtotal.toLocaleString()}`;
    document.getElementById('tax').textContent = `¥${tax.toLocaleString()}`;
    document.getElementById('grand-total').textContent = `¥${grand.toLocaleString()}`;

    document.getElementById('result-section').classList.remove('hidden');
    document.getElementById('info-note').classList.remove('hidden');
    document.getElementById('reset-btn').classList.remove('hidden');
  }

  function reset() {
    selectedFile = null;
    document.getElementById('upload-section').classList.remove('hidden');
    analyzeBtn.classList.remove('hidden');
    analyzeBtn.disabled = true;
    document.getElementById('result-section').classList.add('hidden');
    document.getElementById('reset-btn').classList.add('hidden');
    document.getElementById('info-note').classList.add('hidden');
    document.getElementById('parts-section').classList.remove('hidden');

    const img = document.getElementById('preview-img');
    img.classList.add('hidden');
    img.src = '';
    document.getElementById('upload-placeholder').classList.remove('hidden');
    document.getElementById('change-photo-btn').classList.add('hidden');
    document.getElementById('upload-area').classList.remove('has-image');
    fileInput.value = '';
  }
</script>
</body>
</html>
